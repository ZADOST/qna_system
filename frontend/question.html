<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion Thread - Student Talks</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🎙️ Student Talks Q&A</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Discussions</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <a class="btn btn-light text-primary fw-bold px-4 shadow-sm" href="ask.html">Ask a Question</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5" style="min-height: 70vh;">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                
                <div class="mb-4">
                    <a href="index.html" class="text-decoration-none text-muted">← Back to Discussions</a>
                </div>

                <div class="card shadow-sm border-0 rounded-4 mb-5" id="questionDetailsCard">
                    <div class="card-body p-4 p-md-5">
                        <div id="qLoadingSpinner" class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading thread...</span>
                            </div>
                        </div>
                        <div id="qContent" class="d-none">
                            <h2 class="fw-bold text-dark mb-3" id="qTitle"></h2>
                            <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                                <span class="author-badge me-3" id="qAuthor"></span>
                                <small class="text-muted" id="qDate"></small>
                            </div>
                            <div class="fs-5 text-dark" style="line-height: 1.7;" id="qBody"></div>
                        </div>
                    </div>
                </div>

                <h4 class="fw-bold mb-4">Answers <span id="answerCount" class="badge bg-secondary rounded-pill fs-6 ms-2">0</span></h4>
                <div id="answersContainer" class="mb-5">
                    </div>

                <div class="card shadow-sm border-0 rounded-4 bg-white mt-5">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="fw-bold text-dark mb-4">Contribute an Answer</h4>
                        <form id="answerForm">
                            <div id="answerFormMessage" class="alert d-none" role="alert"></div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="ansAuthorInput" class="form-label fw-semibold">Your Name</label>
                                    <input type="text" class="form-control form-control-lg bg-light border-0" id="ansAuthorInput" placeholder="Enter your name" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="ansBodyInput" class="form-label fw-semibold">Your Answer</label>
                                <textarea class="form-control form-control-lg bg-light border-0" id="ansBodyInput" rows="4" placeholder="Share your knowledge..." required></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-success btn-lg fw-bold shadow-sm hover-lift" id="submitAnsBtn">
                                Post Answer
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto border-top border-secondary">
        <div class="container">
            <p class="mb-0 text-white-50">&copy; 2026 Student Talks Q&A Architecture. Designed for seamless academic integration.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
