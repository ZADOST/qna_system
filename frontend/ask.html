<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Question - Student Talks</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🎙️ Student Talks Q&A</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Discussions</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <a class="btn btn-light text-primary fw-bold px-4 shadow-sm" href="ask.html">Ask a Question</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5" style="min-height: 70vh;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="mb-4">
                    <a href="index.html" class="text-decoration-none text-muted">← Back to Discussions</a>
                </div>

                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-5">
                        <h2 class="fw-bold text-dark mb-4">Start a New Topic</h2>
                        <p class="text-muted mb-4">Share your question with the community. Be as clear and detailed as possible to get the best answers.</p>

                        <form id="askForm">
                            <div id="formMessage" class="alert d-none" role="alert"></div>

                            <div class="mb-3">
                                <label for="authorInput" class="form-label fw-semibold">Your Name</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0" id="authorInput" placeholder="e.g., Shazad Babakr" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="titleInput" class="form-label fw-semibold">Question Title</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0" id="titleInput" placeholder="Keep it short and to the point" required>
                            </div>
                            
                            <div class="mb-4">
                                <label for="bodyInput" class="form-label fw-semibold">Question Details</label>
                                <textarea class="form-control form-control-lg bg-light border-0" id="bodyInput" rows="6" placeholder="Provide background context or explain what you are trying to understand..." required></textarea>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm hover-lift" id="submitBtn">
                                    Publish Question
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto border-top border-secondary">
        <div class="container">
            <p class="mb-0 text-white-50">&copy; 2026 Student Talks Q&A Architecture. Designed for seamless academic integration.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
